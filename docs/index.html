<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDS 履修ガイドブック 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <div class="container">
      <h1 class="header-title">SDS 履修ガイドブック <span class="year">2026</span></h1>
      <p class="header-sub">一橋大学 ソーシャル・データサイエンス学部（非公式）</p>
      <nav class="nav">
        <a href="#courses" class="nav-link active">科目一覧</a>
        <a href="#guide" class="nav-link">履修ガイド</a>
      </nav>
    </div>
  </header>

  <!-- 科目一覧セクション -->
  <section id="courses" class="section">
    <div class="container">

      <!-- フィルタバー -->
      <div class="filter-bar">
        <input type="text" id="search" class="search-input" placeholder="科目名・教員名で検索…">
        <div class="filter-group">
          <div class="category-filters" id="category-filters"></div>
          <select id="kubun-filter" class="filter-select">
            <option value="">全科目区分</option>
            <option value="学部導入科目">学部導入科目</option>
            <option value="学部基礎科目">学部基礎科目</option>
            <option value="学部発展科目">学部発展科目</option>
            <option value="ゼミ関連">ゼミ関連</option>
            <option value="全学共通科目">全学共通科目</option>
          </select>
        </div>
      </div>

      <p class="result-count" id="result-count"></p>

      <!-- カードグリッド -->
      <div class="card-grid" id="card-grid">
        <p class="loading">読み込み中…</p>
      </div>
    </div>
  </section>

  <!-- 履修ガイドセクション -->
  <section id="guide" class="section section-guide">
    <div class="container">
      <h2 class="section-title">履修ガイド</h2>
      <div class="guide-content" id="guide-content">
        <p class="loading">読み込み中…</p>
      </div>
    </div>
  </section>

  <!-- モーダル -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close">&times;</button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- フッター -->
  <footer class="footer">
    <div class="container">
      <p>本ガイドブックは学生有志が作成した非公式の資料です。正確な情報は必ずシラバスや大学公式サイトで確認してください。</p>
      <p>お問い合わせ: <a href="https://x.com/SDS_info2024" target="_blank">@SDS_info2024</a></p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
